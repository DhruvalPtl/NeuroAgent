# =============================================================================
# tmem.yaml — Disease config: TMEM (Transmembrane protein aggregation)
# Schema version: 1.0  (see config/_schema.yaml for field definitions)
# =============================================================================
# DATA STATUS: Populated — data split from real_lab_batch_001.xlsx
#              Sr No. 181-214.  Data lives at data/raw/tmem/.
#              Same label schema and PTM logic as alpha_synuclein
#              (studied in the same wet-lab experiment, same assay).
# =============================================================================

schema_version: "1.0"

# ------------------------------------------------------------------
# Identity
# ------------------------------------------------------------------
name: "tmem"

# ------------------------------------------------------------------
# Data paths
# ------------------------------------------------------------------
raw_data_path: "data/raw/tmem/"

# ------------------------------------------------------------------
# Column mappings  (same as alpha_synuclein — same lab file format)
# ------------------------------------------------------------------
sequence_column: "sequence"
label_column: "aggregation_severity"

# ------------------------------------------------------------------
# Ordinal label schema  (identical — same assay)
# ------------------------------------------------------------------
label_schema:
  - null      # 0 — no aggregation / benign
  - "Low"     # 1 — low aggregation propensity
  - "Medium"  # 2 — moderate aggregation
  - "High"    # 3 — high / pathological aggregation

# ------------------------------------------------------------------
# Post-translational modifications relevant to TMEM proteins
# Transmembrane domain aggregation is influenced by glycosylation
# and palmitoylation.  Acetylation follows the same 'X' lab encoding.
# ------------------------------------------------------------------
ptm_types:
  - "acetylation"       # K-acetylation (X marker in sequence)
  - "glycosylation"     # N-linked glycosylation — common in TM proteins
  - "palmitoylation"    # Lipid modification influencing membrane anchoring

# ------------------------------------------------------------------
# Sequence-similarity splitting
# Same threshold — variants are fragments of transmembrane domains
# studied under the same lab protocol as the other proteins.
# ------------------------------------------------------------------
homology_cluster_threshold: 0.9
