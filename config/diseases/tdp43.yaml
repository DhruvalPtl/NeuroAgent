# =============================================================================
# tdp43.yaml — Disease config: TDP-43 (TARDBP)
# Schema version: 1.0  (see config/_schema.yaml for field definitions)
# =============================================================================
# DATA STATUS: Populated — data split from real_lab_batch_001.xlsx
#              Sr No. 145-180.  Data lives at data/raw/tdp43/.
#              Same label schema and PTM logic as alpha_synuclein
#              (both proteins studied in the same wet-lab experiment).
# =============================================================================

schema_version: "1.0"

# ------------------------------------------------------------------
# Identity
# ------------------------------------------------------------------
name: "tdp43"

# ------------------------------------------------------------------
# Data paths
# ------------------------------------------------------------------
raw_data_path: "data/raw/tdp43/"

# ------------------------------------------------------------------
# Column mappings  (same as alpha_synuclein — same lab file format)
# ------------------------------------------------------------------
sequence_column: "sequence"
label_column: "aggregation_severity"

# ------------------------------------------------------------------
# Ordinal label schema  (identical — same assay)
# ------------------------------------------------------------------
label_schema:
  - null      # 0 — no aggregation / benign
  - "Low"     # 1 — low aggregation propensity
  - "Medium"  # 2 — moderate aggregation
  - "High"    # 3 — high / pathological aggregation

# ------------------------------------------------------------------
# Post-translational modifications relevant to TDP-43
# Phosphorylation of the C-terminal domain is the key pathological
# marker.  Ubiquitination is also observed in ALS/FTLD inclusions.
# Acetylation follows the same 'X' lab encoding as alpha_synuclein.
# ------------------------------------------------------------------
ptm_types:
  - "acetylation"       # K-acetylation (X marker in sequence)
  - "phosphorylation"   # C-terminal domain phosphorylation (pS409/410)
  - "ubiquitination"    # Ubiquitin-positive inclusions — ALS/FTLD marker

# ------------------------------------------------------------------
# Sequence-similarity splitting
# Same threshold — variants are point mutants within TDP-43 peptide
# fragments studied under the same lab protocol.
# ------------------------------------------------------------------
homology_cluster_threshold: 0.9
