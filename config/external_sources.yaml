# config/external_sources.yaml
# ==============================
# Registry of external public datasets used by NeuroAgent as opt-in
# training/evaluation data sources.
#
# ALL SOURCES ARE LOCAL FILES — no network downloads required.
# These are static published datasets already on disk.
#
# LABEL MAP DESIGN NOTE
# ---------------------
# Each source maps binary labels to ordinal endpoints {0, 3} ONLY,
# intentionally skipping classes 1 (Low) and 2 (Medium).
# This is an explicit, documented decision — see loader.py for rationale.
# The resulting class-distribution skew (no class 1 or 2 from external
# sources) is EXPECTED and will show up in training histograms. This is
# not a bug.
#
# Label matching is always CASE-INSENSITIVE in the adapter — the label_map
# keys below are normalised to lowercase before comparison, so "Amyloid"
# and "amyloid" both match "amyloid: 3".
#
# SKIPPED FILES (documented here so the omission is not silent)
# ------------------------------------------------------------
# data/CPAD/aggregation kinetics.xlsx:
#   Continuous aggregation-rate measurements, not classification labels.
#   Does not fit the binary→ordinal ordinal scheme. Requires a separate
#   regression pipeline, not yet implemented.
#
# data/CPAD/amyloid structure.xlsx:
#   PDB structural data (PDB IDs, crystallography methods, ligands).
#   The peptide sequences overlap with cpad_peptides but come with no
#   usable classification label for the ordinal scheme.  The 'stats'
#   sheet is malformed (column headers are raw values, not names).

waltzdb:
  # WaltzDB 2.0 — hexapeptide amyloid propensity database.
  # Fernandez-Escamilla et al., Nature Methods 2004.
  # ~1,416 hexapeptides, binary amyloid/non-amyloid labels.
  # Local export: data/waltzdb_export.csv (337,959 bytes)
  path: "data/waltzdb_export.csv"
  format: "hexapeptide_binary"
  sequence_col: "Sequence"
  label_col: "Classification"
  label_map:
    non-amyloid: 0   # "No aggregation" — exact values: "non-amyloid" (all lowercase in this file)
    amyloid: 3       # "High aggregation" — exact values: "amyloid" (all lowercase in this file)

cpad_peptides:
  # CPAD (Curated Protein Aggregation Database) — aggregating peptides.
  # Nagarajan et al., Nucleic Acids Research 2012.
  # ~2,031 peptides (Amyloid + Non-amyloid), mixed sources:
  #   WaltzDB, CPAD, AmyLoad, Waltz.
  # Local file: data/CPAD/aggregating peptides.xlsx, sheet "peptide".
  #
  # IMPORTANT — mixed-case Classification column confirmed by inspection:
  #   "Amyloid" (716), "Non-amyloid" (1055), "amyloid" (201), "non-amyloid" (59)
  # The adapter uses case-insensitive comparison, so all four variants resolve
  # correctly to {0, 3}.
  path: "data/CPAD/aggregating peptides.xlsx"
  sheet: "peptide"
  format: "hexapeptide_binary"
  sequence_col: "Peptide"
  label_col: "Classification"
  label_map:
    non-amyloid: 0   # matches "Non-amyloid" and "non-amyloid" (case-insensitive)
    amyloid: 3       # matches "Amyloid" and "amyloid" (case-insensitive)

apr_regions:
  # APR Information — Aggregation-Prone Regions from CPAD.
  # Mixes AmyPro, CPAD, and AmyLoad provenance rows in one sheet.
  # Each row: a full protein sequence + one experimentally confirmed
  # amyloidogenic region (start–end annotated in Sequence Position).
  # Local file: data/CPAD/APR information.xlsx, sheet "final data".
  #
  # The adapter generates:
  #   Positive rows  → the Experimental Aggregating Region substring
  #   Negative rows  → non-overlapping windows of the remaining protein
  #
  # PROVENANCE NOTE: the 'Source' column contains per-row provenance
  # ("AmyPro", "CPAD", "AmyLoad"). This value is written to source_file
  # for each output row — it is NOT collapsed to a single string.
  # This preserves real provenance so downstream consumers can filter by
  # originating database. Collapsing it would constitute the same
  # provenance-erasure mistake as the alpha_synuclein disease-mislabeling bug.
  path: "data/CPAD/APR information.xlsx"
  sheet: "final data"
  format: "region_within_protein"
  full_sequence_col: "Protein Sequence"
  region_col: "Experimental Aggregating Region"
  provenance_col: "Source"
  label_map:
    non_amyloidogenic_region: 0   # negative windows (not in DB, derived)
    amyloidogenic_region: 3       # the confirmed APR region

# CANYA — REMOVED.
# The Science Advances 2026 paper's Zenodo DOI was not confirmed.
# No local file exists. A guessed/placeholder URL is worse than
# omitting the source — if the adapter silently fails at download time,
# a training run would proceed with silently missing data.
# Re-add when a confirmed access point or local file is available.
